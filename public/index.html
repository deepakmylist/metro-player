<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Player</title>
    <style>
        /* --- GLOBAL DESIGN LANGUAGE --- */
        :root { --bg-color: #000000; --text-main: #FFFFFF; --text-muted: #777777; --accent: #FF0097; --font-stack: "Segoe UI", "Helvetica Neue", -apple-system, sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-stack); overflow-x: hidden; height: 100vh; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        h1, h2, h3, h4 { text-transform: lowercase; font-weight: 300; }
        a { text-decoration: none; color: inherit; cursor: pointer; transition: color 0.2s ease; }
        a:hover { color: var(--accent); }

        /* --- GLOBAL NAVIGATION --- */
        nav { padding: 40px 60px 20px 60px; display: flex; gap: 30px; align-items: baseline; flex-shrink: 0; z-index: 10; position: relative; }
        #back-btn { background: transparent; border: none; color: var(--text-main); font-size: 3.5rem; line-height: 0.8; cursor: pointer; font-family: var(--font-stack); font-weight: 300; transition: color 0.2s, transform 0.2s; display: none; padding-right: 15px; }
        #back-btn:hover { color: var(--accent); transform: translateX(-5px); }
        .nav-link { font-size: 4rem; color: var(--text-muted); letter-spacing: -2px; }
        .nav-link.active { color: var(--text-main); font-weight: 700; }
        .theme-picker { position: absolute; right: 60px; top: 60px; display: flex; gap: 10px; z-index: 20; }
        .swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
        .swatch:hover { transform: scale(1.2); border-color: var(--text-main); }

        /* --- SCREEN CONTAINER --- */
        #screen-container { flex-grow: 1; position: relative; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; padding: 0 60px 100px 60px; animation: fade-in 0.4s ease forwards; overflow-y: auto;}
        .screen.active { display: block; }
        @keyframes fade-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- REUSABLE UI ELEMENTS --- */
        .text-list { display: flex; flex-direction: column; gap: 15px; }
        .track-item { display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background-color 0.2s; padding: 5px; border-radius: 4px; }
        .track-item:hover { background-color: rgba(255,255,255,0.05); }
        .track-item:hover .track-title { color: var(--accent); }
        .mini-art { width: 45px; height: 45px; background-color: #222; flex-shrink: 0; display: flex; justify-content: center; align-items: center; font-size: 1rem; color: #444; transition: background-color 0.2s; background-size: cover; background-position: center;}
        .track-item:hover .mini-art { color: var(--text-main); }
        .track-info { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; min-width: 0; }
        .track-title { font-size: 1.2rem; transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-subtitle { font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-num { color: var(--text-muted); font-size: 0.9rem; width: 20px; flex-shrink: 0;}

        /* --- SCREEN 1: EXPLORE --- */
        #screen-explore { overflow-x: auto; white-space: nowrap; touch-action: pan-x; }
        #screen-explore.active { display: flex; gap: 80px; }
        .pano-group { display: inline-flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .pano-group h2 { font-size: 2rem; color: var(--text-muted); margin-bottom: 10px; }
        .album-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .album-art-square { width: 150px; height: 150px; background-color: #222; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: transparent; transition: transform 0.2s, background-color 0.2s; cursor: pointer; background-size: cover; background-position: center;}
        .album-art-square:hover { transform: scale(1.05); color: var(--text-main); background-color: rgba(0,0,0,0.5); background-blend-mode: overlay; }
        .genre-block { width: 315px; height: 150px; background-color: var(--accent); padding: 20px; display: flex; align-items: flex-end; font-size: 2rem; font-weight: 300; cursor: pointer; transition: opacity 0.2s; }
        .genre-block:hover { opacity: 0.8; }
        .genre-block.blue { background-color: #1BA1E2; }
        .genre-block.lime { background-color: #8CBF26; }

        /* --- SCREEN 2: SEARCH --- */
        .search-container { width: 100%; max-width: 1400px; }
        .input-wrapper { position: relative; width: 100%; margin-bottom: 40px; }
        .search-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--accent); color: var(--text-main); font-size: 4rem; font-family: var(--font-stack); font-weight: 300; padding-bottom: 10px; outline: none; transition: border-color 0.3s ease; padding-right: 50px;}
        .search-input::placeholder { color: #333; }
        .clear-btn { position: absolute; right: 0; bottom: 20px; font-size: 3rem; color: var(--text-muted); cursor: pointer; border: none; background: transparent; display: none; transition: color 0.2s; font-family: var(--font-stack); font-weight: 300; line-height: 1;}
        .clear-btn:hover { color: var(--accent); }
        .search-results { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
        .search-col h3 { color: var(--text-muted); font-size: 1.5rem; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #222;}

        /* --- SCREEN 4: NOW PLAYING --- */
        #screen-now-playing { flex-direction: row; padding: 0; background: radial-gradient(circle at 30% 50%, #2a0019 0%, #000000 80%); }
        #screen-now-playing.active { display: flex; }
        .np-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 80px; }
        .np-layout { display: flex; align-items: center; gap: 60px; margin-bottom: 60px; }
        .np-album-art { width: 350px; height: 350px; background-color: var(--accent); box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); transition: background-image 0.3s ease; background-size: cover; background-position: center;}
        .np-info h1 { font-size: 5rem; font-weight: 700; line-height: 1.1; margin-bottom: 10px; }
        .np-info h2 { font-size: 2.5rem; color: var(--accent); margin-bottom: 5px; }
        .np-info h3 { font-size: 1.5rem; color: var(--text-muted); }
        .np-controls { width: 60%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .timeline { width: 100%; display: flex; align-items: center; gap: 15px; font-size: 1rem; color: var(--text-muted); }
        .timeline-bar { flex-grow: 1; height: 2px; background: #333; position: relative; cursor: pointer; }
        .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease;}
        .control-buttons { display: flex; gap: 40px; align-items: center; }
        .btn-skip { background: transparent; border: none; color: var(--text-main); font-size: 2rem; cursor: pointer; }
        .btn-skip:hover { color: var(--accent); }
        .btn-play-large { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--text-main); background: transparent; color: var(--text-main); font-size: 2rem; cursor: pointer; transition: all 0.2s; }
        .btn-play-large:hover { background: var(--text-main); color: var(--bg-color); }

        /* --- MINI PLAYER (GLOBAL) --- */
        .mini-player { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background-color: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; z-index: 100; border-top: 1px solid #222; }
        .mp-left { display: flex; align-items: center; gap: 20px; cursor: pointer; flex: 1; min-width: 0;}
        .mp-left:hover .mp-title { color: var(--accent); }
        .mp-art { width: 50px; height: 50px; background-color: var(--accent); flex-shrink: 0; background-size: cover; background-position: center;}
        .mp-info { display: flex; flex-direction: column; overflow: hidden; white-space: nowrap; }
        .mp-title { font-size: 1.2rem; font-weight: bold; text-overflow: ellipsis; overflow: hidden;}
        .mp-artist { font-size: 0.9rem; color: var(--text-muted); text-overflow: ellipsis; overflow: hidden;}
        .mp-controls { display: flex; align-items: center; gap: 25px; flex-shrink: 0;}
        .mp-btn { background: transparent; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; transition: color 0.2s;}
        .mp-btn:hover { color: var(--accent); }

        /* Mobile */
        @media screen and (max-width: 900px) {
            nav { padding: 20px 20px 10px 20px; gap: 15px; }
            .nav-link { font-size: 2.5rem; }
            #back-btn { font-size: 2.5rem; padding-right: 5px;}
            .theme-picker { top: 25px; right: 20px; }
            .screen { padding: 0 20px 100px 20px; }
            #screen-explore.active { gap: 40px; }
            .pano-group { min-width: 85vw; }
            .pano-group[style*="min-width: 450px"] { min-width: 85vw !important; }
            .search-input { font-size: 2rem; padding-bottom: 5px; }
            .clear-btn { font-size: 2rem; bottom: 10px;}
            .search-results { grid-template-columns: 1fr; gap: 30px; }
            #screen-now-playing { flex-direction: column; overflow-y: auto; }
            .np-main { padding: 40px 20px 20px 20px; }
            .np-layout { flex-direction: column; text-align: center; gap: 30px; margin-bottom: 30px; }
            .np-album-art { width: 250px; height: 250px; }
            .np-info h1 { font-size: 2.5rem; }
            .np-info h2 { font-size: 1.5rem; }
            .np-info h3 { font-size: 1rem; }
            .np-controls { width: 100%; }
            .mini-player { padding: 0 15px; height: 70px; }
            .mp-art { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div id="yt-player-container" style="position: absolute; top: -9999px; left: -9999px;"></div>

    <script>
        const themes = { magenta: '#FF0097', cyan: '#1BA1E2', lime: '#8CBF26', orange: '#F3A000' };
        function setTheme(themeKey) {
            const root = document.documentElement;
            if (themes[themeKey]) {
                root.style.setProperty('--accent', themes[themeKey]);
                localStorage.setItem('metro-player-theme', themeKey);
            }
        }
        setTheme(localStorage.getItem('metro-player-theme') || 'magenta');
    </script>

    <nav>
        <button id="back-btn" onclick="goBack()" title="Go Back">&#8592;</button>
        <a id="nav-explore" class="nav-link active" onclick="switchScreen('explore')">explore</a>
        <a id="nav-search" class="nav-link" onclick="switchScreen('search')">search</a>
        <div class="theme-picker">
            <div class="swatch" style="background: #FF0097;" onclick="setTheme('magenta')"></div>
            <div class="swatch" style="background: #1BA1E2;" onclick="setTheme('cyan')"></div>
            <div class="swatch" style="background: #8CBF26;" onclick="setTheme('lime')"></div>
            <div class="swatch" style="background: #F3A000;" onclick="setTheme('orange')"></div>
        </div>
    </nav>

    <div id="screen-container">
        <section id="screen-explore" class="screen active">
            <div class="pano-group">
                <h2>new releases</h2>
                <div class="album-grid" id="explore-albums">
                    <p style="color: #444;">loading...</p>
                </div>
            </div>
            <div class="pano-group" style="min-width: 450px;">
                <h2>top tracks</h2>
                <div class="text-list" id="explore-tracks">
                    <p style="color: #444;">loading...</p>
                </div>
            </div>
            <div class="pano-group">
                <h2>genres</h2>
                <div class="genre-block" onclick="triggerSearch('electronic')">electronic</div>
                <div class="genre-block blue" onclick="triggerSearch('indie rock')">indie rock</div>
                <div class="genre-block lime" onclick="triggerSearch('hip hop')">hip hop</div>
            </div>
        </section>

        <section id="screen-search" class="screen">
            <div class="search-container">
                <div class="input-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="type an artist, album, song..." autocomplete="off">
                    <button class="clear-btn" id="clearBtn">×</button>
                </div>
                <div id="loader" style="display: none; color: var(--accent); font-size: 1.5rem; margin-bottom: 20px;">searching...</div>
                
                <div id="dynamic-search-results" class="search-results" style="display: none;">
                    <div class="search-col"><h3>artists</h3><div class="text-list" id="res-artists"></div></div>
                    <div class="search-col"><h3>albums</h3><div class="text-list" id="res-albums"></div></div>
                    <div class="search-col"><h3>tracks</h3><div class="text-list" id="res-tracks"></div></div>
                    <div class="search-col"><h3>playlists</h3><div class="text-list" id="res-playlists"></div></div>
                </div>

                <div id="static-search-placeholders" class="search-results">
                    <div class="search-col"><h3>artists</h3><p style="color:#333;">search to populate...</p></div>
                    <div class="search-col"><h3>albums</h3></div>
                    <div class="search-col"><h3>tracks</h3></div>
                    <div class="search-col"><h3>playlists</h3></div>
                </div>
            </div>
        </section>

        <section id="screen-now-playing" class="screen">
            <div class="np-main">
                <div class="np-layout">
                    <div class="np-album-art" id="np-art"></div>
                    <div class="np-info">
                        <h1 id="np-title">ready to play</h1>
                        <h2 id="np-artist">select a track</h2>
                        <h3>youtube music</h3>
                    </div>
                </div>
                <div class="np-controls">
                    <div class="timeline">
                        <span id="np-time-current">0:00</span>
                        <div class="timeline-bar"><div class="timeline-progress" id="np-progress-bar"></div></div>
                        <span id="np-time-total">0:00</span>
                    </div>
                    <div class="control-buttons">
                        <button class="btn-skip">⏮</button>
                        <button class="btn-play-large" id="np-play-btn" onclick="togglePlay()">▶</button>
                        <button class="btn-skip">⏭</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="mini-player">
        <div class="mp-left" onclick="switchScreen('now-playing')">
            <div class="mp-art" id="mp-art"></div>
            <div class="mp-info">
                <span class="mp-title" id="mp-title">ready to play</span>
                <span class="mp-artist" id="mp-artist">search to begin</span>
            </div>
        </div>
        <div class="mp-controls">
            <button class="mp-btn">⏮</button>
            <button class="mp-btn" id="mp-play-btn" onclick="togglePlay()">▶</button>
            <button class="mp-btn">⏭</button>
        </div>
    </div>

    <script>
        // --- ROUTING ---
        let navHistory = ['explore'];

        function switchScreen(screenId, isBackAction = false) {
            if (!isBackAction) {
                if (navHistory[navHistory.length - 1] !== screenId) navHistory.push(screenId);
            }
            document.getElementById('back-btn').style.display = navHistory.length > 1 ? 'inline-block' : 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + screenId);
            if (activeNav) activeNav.classList.add('active');
        }

        function goBack() {
            if (navHistory.length > 1) {
                navHistory.pop(); 
                switchScreen(navHistory[navHistory.length - 1], true); 
            }
        }

        const exploreScreen = document.getElementById('screen-explore');
        exploreScreen.addEventListener('wheel', (evt) => {
            if (window.innerWidth > 900) { evt.preventDefault(); exploreScreen.scrollLeft += evt.deltaY; }
        });

        // --- AUDIO ENGINE ---
        let ytPlayer;
        let isPlaying = false;
        let isPlayerReady = false;
        let progressInterval;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-container', {
                height: '0', width: '0',
                events: {
                    'onReady': () => { isPlayerReady = true; loadExploreData(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            const btns = [document.getElementById('mp-play-btn'), document.getElementById('np-play-btn')];
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                btns.forEach(b => b.textContent = '⏸');
                startProgressBar();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                btns.forEach(b => b.textContent = '▶');
                stopProgressBar();
            }
        }

        function startProgressBar() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (isPlaying && ytPlayer && ytPlayer.getCurrentTime) {
                    const current = ytPlayer.getCurrentTime();
                    const total = ytPlayer.getDuration();
                    if (total > 0) {
                        document.getElementById('np-progress-bar').style.width = ((current / total) * 100) + '%';
                        document.getElementById('np-time-current').textContent = formatTime(current);
                        document.getElementById('np-time-total').textContent = formatTime(total);
                    }
                }
            }, 500);
        }

        function stopProgressBar() { if (progressInterval) clearInterval(progressInterval); }
        function formatTime(s) { const m = Math.floor(s/60); return `${m}:${Math.floor(s%60).toString().padStart(2, '0')}`; }

        function playTrack(videoId, trackName, artistName, artUrl) {
            if (!isPlayerReady) return alert("Initializing audio...");
            
            ['mp', 'np'].forEach(prefix => {
                document.getElementById(`${prefix}-title`).textContent = trackName;
                document.getElementById(`${prefix}-artist`).textContent = artistName;
                document.getElementById(`${prefix}-art`).style.backgroundImage = `url('${artUrl}')`;
            });
            
            document.getElementById('np-progress-bar').style.width = '0%';
            switchScreen('now-playing');
            ytPlayer.loadVideoById(videoId);
        }

        function togglePlay() {
            if (!isPlayerReady) return;
            isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
        }

        // --- SEARCH ENGINE ---
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const dynamicResults = document.getElementById('dynamic-search-results');
        const staticPlaceholders = document.getElementById('static-search-placeholders');
        let debounceTimer;

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 0) {
                clearBtn.style.display = 'block';
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => fetchSearch(query), 600); // 600ms Live Search
            } else {
                clearSearchUI();
            }
        });

        clearBtn.addEventListener('click', clearSearchUI);

        function clearSearchUI() {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            dynamicResults.style.display = 'none';
            staticPlaceholders.style.display = 'grid';
        }

        function triggerSearch(term) {
            switchScreen('search');
            searchInput.value = term;
            searchInput.dispatchEvent(new Event('input'));
        }

        async function fetchSearch(query) {
            document.getElementById('loader').style.display = 'block';
            staticPlaceholders.style.display = 'none';
            dynamicResults.style.display = 'none';
            
            // Clear current columns
            ['res-artists', 'res-albums', 'res-tracks', 'res-playlists'].forEach(id => document.getElementById(id).innerHTML = '');

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const results = await response.json();
                
                // Categorize
                const tracks = results.filter(r => r.type === 'SONG' || r.type === 'VIDEO').slice(0, 7);
                const artists = results.filter(r => r.type === 'ARTIST').slice(0, 5);
                const albums = results.filter(r => r.type === 'ALBUM').slice(0, 5);
                const playlists = results.filter(r => r.type === 'PLAYLIST').slice(0, 5);

                populateColumn('res-tracks', tracks, true);
                populateColumn('res-artists', artists, false);
                populateColumn('res-albums', albums, false);
                populateColumn('res-playlists', playlists, false);

            } catch (error) {
                console.error("Search failed", error);
            } finally {
                document.getElementById('loader').style.display = 'none';
                dynamicResults.style.display = 'grid';
            }
        }

        function populateColumn(containerId, items, isPlayable) {
            const container = document.getElementById(containerId);
            if (items.length === 0) { container.innerHTML = '<p style="color:#444;">no results.</p>'; return; }

            items.forEach(item => {
                const img = item.thumbnails && item.thumbnails.length > 0 ? item.thumbnails[item.thumbnails.length - 1].url : '';
                const name = item.name;
                const sub = item.artist ? item.artist.name : (item.author ? item.author.name : item.type);
                
                const el = document.createElement('div');
                el.className = 'track-item';
                
                // If it's a track, clicking plays it. Otherwise, clicking triggers a new search for that item.
                if (isPlayable && item.videoId) {
                    el.onclick = () => playTrack(item.videoId, name, sub, img);
                } else {
                    el.onclick = () => triggerSearch(name);
                }

                const icon = isPlayable ? '▶' : '';
                const artStyle = item.type === 'ARTIST' ? 'border-radius: 50%;' : '';

                el.innerHTML = `
                    <div class="mini-art" style="background-image: url('${img}'); ${artStyle}">${icon}</div>
                    <div class="track-info">
                        <span class="track-title">${name.toLowerCase()}</span>
                        <span class="track-subtitle">${sub.toLowerCase()}</span>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        // --- EXPLORE TAB HYDRATION ---
        async function loadExploreData() {
            try {
                const response = await fetch('/api/explore');
                const data = await response.json();
                
                const albumContainer = document.getElementById('explore-albums');
                const tracksContainer = document.getElementById('explore-tracks');
                albumContainer.innerHTML = '';
                tracksContainer.innerHTML = '';

                // Populate Albums
                if (data.newAlbums) {
                    data.newAlbums.forEach(album => {
                        const img = album.thumbnails ? album.thumbnails[album.thumbnails.length - 1].url : '';
                        const el = document.createElement('div');
                        el.className = 'album-art-square';
                        el.style.backgroundImage = `url('${img}')`;
                        el.innerHTML = '▶';
                        el.onclick = () => triggerSearch(album.name);
                        albumContainer.appendChild(el);
                    });
                }

                // Populate Tracks
                if (data.topTracks) {
                    data.topTracks.forEach((track, i) => {
                        const img = track.thumbnails ? track.thumbnails[track.thumbnails.length - 1].url : '';
                        const artist = track.artist ? track.artist.name : 'Unknown';
                        const el = document.createElement('div');
                        el.className = 'track-item';
                        el.onclick = () => playTrack(track.videoId, track.name, artist, img);
                        el.innerHTML = `
                            <div class="track-num">${(i+1).toString().padStart(2, '0')}</div>
                            <div class="mini-art" style="background-image: url('${img}')">▶</div>
                            <div class="track-info">
                                <span class="track-title">${track.name.toLowerCase()}</span>
                                <span class="track-subtitle">${artist.toLowerCase()}</span>
                            </div>
                        `;
                        tracksContainer.appendChild(el);
                    });
                }
            } catch (err) {
                console.error("Failed to load Explore data.");
            }
        }
    </script>
</body>
</html>
